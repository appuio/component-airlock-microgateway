apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    airlock-microgateway.appuio.io/httproute-default-cluster-issuer: digicert-ev
  name: vshn-airlock-dev-01
  namespace: vshn-airlock-dev-01
spec:
  gatewayClassName: microgateway-cloudscale
  infrastructure:
    parametersRef:
      group: microgateway.airlock.com
      kind: GatewayParameters
      name: parameters-dev-01
  listeners:
    - name: http-default
      port: 80
      protocol: HTTP
---
apiVersion: microgateway.airlock.com/v1alpha1
kind: GatewayParameters
metadata:
  name: vshn-airlock-dev-01
  namespace: vshn-airlock-dev-01
spec:
  defaults:
    downstream:
      remoteIP:
        proxyProtocol: {}
    sessionHandlingRef:
      name: redis-session
  features:
    envoyExtensionPolicyEnabled: true
    insecureTLSAllowed: true
  kubernetes:
    deployment:
      automountServiceAccountToken: false
      engineContainer:
        resources:
          limits:
            cpu: 1
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
      placement:
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: gateway.networking.k8s.io/gateway-name
                      operator: In
                      values:
                        - vshn-airlock-dev-01
                topologyKey: kubernetes.io/hostname
        nodeSelector:
          node-role.kubernetes.io/infra: ''
      replicas: 2
    service:
      annotations:
        k8s.cloudscale.ch/loadbalancer-floating-ips: '["46.246.132.110/32","9b2f:7a1c:fad1/128"]'
        k8s.cloudscale.ch/loadbalancer-listener-allowed-cidrs: '["42.65.119.49/32",
          "9b2f:48d7:fad1:7a1c::178/128"]'
        k8s.cloudscale.ch/loadbalancer-name: ingress-dev-01
        k8s.cloudscale.ch/loadbalancer-pool-protocol: proxyv2
      externalTrafficPolicy: Local
      type: LoadBalancer
  logging:
    level: info
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  namespace: vshn-airlock-dev-01
spec: {}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  gateway.networking.k8s.io/gateway-name: vshn-airlock-dev-01
  namespace: vshn-airlock-dev-01
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  namespace: vshn-airlock-dev-01
---
apiVersion: microgateway.airlock.com/v1alpha1
kind: SessionHandling
metadata:
  name: vshn-airlock-dev-01
  namespace: vshn-airlock-dev-01
---
apiVersion: microgateway.airlock.com/v1alpha1
kind: RedisProvider
metadata:
  name: vshn-airlock-dev-01
  namespace: vshn-airlock-dev-01
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    name: vshn-airlock-dev-01
    openshift.io/cluster-monitoring: 'true'
  name: vshn-airlock-dev-01
