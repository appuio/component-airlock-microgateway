apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  annotations:
    airlock-microgateway.appuio.io/httproute-default-cluster-issuer: digicert-ev
  name: vshn-airlock-dev-01
  namespace: vshn-airlock-dev-01
spec:
  gatewayClassName: microgateway-cloudscale
  infrastructure:
    parametersRef:
      group: microgateway.airlock.com
      kind: GatewayParameters
      name: parameters-dev-01
  listeners:
    - name: http-default
      port: 80
      protocol: HTTP
---
apiVersion: microgateway.airlock.com/v1alpha1
defaults:
  customResponses:
    local:
      - customResponseRef:
          name: '401'
        statusCodeCondition:
          matcher:
            exact: 401
      - customResponseRef:
          name: '403'
        statusCodeCondition:
          matcher:
            exact: 403
      - customResponseRef:
          name: '404'
        statusCodeCondition:
          matcher:
            exact: 404
      - customResponseRef:
          name: 4xx
        statusCodeCondition:
          matcher:
            range:
              from: 400
              to: 499
      - customResponseRef:
          name: '502'
        statusCodeCondition:
          matcher:
            exact: 502
      - customResponseRef:
          name: 5xx
        statusCodeCondition:
          matcher:
            range:
              from: 500
              to: 599
    upstream:
      - customResponseRef:
          name: '401'
        responseConditions:
          statusCode:
            matcher:
              exact: 401
      - customResponseRef:
          name: '403'
        responseConditions:
          statusCode:
            matcher:
              exact: 403
      - customResponseRef:
          name: '404'
        responseConditions:
          statusCode:
            matcher:
              exact: 404
      - customResponseRef:
          name: 4xx
        responseConditions:
          statusCode:
            matcher:
              range:
                end: 499
                start: 400
      - customResponseRef:
          name: '502'
        responseConditions:
          statusCode:
            matcher:
              exact: 502
      - customResponseRef:
          name: 5xx
        responseConditions:
          statusCode:
            matcher:
              range:
                end: 599
                start: 500
kind: GatewayParameters
metadata:
  name: vshn-airlock-dev-01
  namespace: vshn-airlock-dev-01
spec:
  defaults:
    downstream:
      remoteIP:
        proxyProtocol: {}
    sessionHandlingRef:
      name: redis-session
  features:
    envoyExtensionPolicyEnabled: true
    insecureTLSAllowed: true
  kubernetes:
    deployment:
      automountServiceAccountToken: false
      engineContainer:
        resources:
          limits:
            cpu: 1
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
      placement:
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: gateway.networking.k8s.io/gateway-name
                      operator: In
                      values:
                        - vshn-airlock-dev-01
                topologyKey: kubernetes.io/hostname
        nodeSelector:
          node-role.kubernetes.io/infra: ''
      replicas: 2
    service:
      annotations:
        k8s.cloudscale.ch/loadbalancer-floating-ips: '["46.246.132.110/32","9b2f:7a1c:fad1/128"]'
        k8s.cloudscale.ch/loadbalancer-listener-allowed-cidrs: '["42.65.119.49/32",
          "9b2f:48d7:fad1:7a1c::178/128"]'
        k8s.cloudscale.ch/loadbalancer-name: ingress-dev-01
        k8s.cloudscale.ch/loadbalancer-pool-protocol: proxyv2
      externalTrafficPolicy: Local
      type: LoadBalancer
  logging:
    level: info
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-filter-redirect
  namespace: vshn-airlock-dev-01
spec:
  hostnames:
    - '*.customer.ch'
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: vshn-airlock-dev-01
      sectionName: http-default
  rules:
    - filters:
        - requestRedirect:
            scheme: https
            statusCode: 301
          type: RequestRedirect
      matches:
        - method: GET
          path:
            type: PathPrefix
            value: /
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  labels:
    gateway.networking.k8s.io/gateway-name: vshn-airlock-dev-01
  name: vshn-airlock-dev-01
  namespace: vshn-airlock-dev-01
spec:
  minAvailable: 1
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: vshn-airlock-dev-01
  unhealthyPodEvictionPolicy: IfHealthyBudget
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: microgateway-egress
  namespace: vshn-airlock-dev-01
spec:
  egress:
    - ports:
        - port: 13377
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: syn-airlock-microgateway
    - ports:
        - port: 5353
          protocol: UDP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
    - ports:
        - port: 6379
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              appcat.vshn.io/claim-namespace: vshn-airlock-redis
    - ports:
        - port: 8080
          protocol: TCP
        - port: 8443
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              appcat.vshn.io/claim-namespace: broker-preprod
    - ports:
        - port: 3000
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: customer-arch-test
    - ports:
        - port: 443
          protocol: TCP
      to:
        - ipBlock:
            cidr: 1.1.1.1/32
    - ports:
        - port: 443
          protocol: TCP
      to:
        - ipBlock:
            cidr: 1.1.1.2/32
    - ports:
        - port: 443
          protocol: TCP
      to:
        - ipBlock:
            cidr: 1.1.1.3/32
    - ports:
        - port: 80
          protocol: TCP
      to:
        - ipBlock:
            cidr: 1.1.1.4/32
    - ports:
        - port: 8080
          protocol: TCP
      to:
        - ipBlock:
            cidr: 1.1.1.5/32
    - ports:
        - port: 1080
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: qa-airlock-gateway
  podSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-class-name: microgateway-cloudscale
      gateway.networking.k8s.io/gateway-name: vshn-airlock-dev-01
  policyTypes:
    - Egress
---
apiVersion: microgateway.airlock.com/v1alpha1
kind: SessionHandling
metadata:
  name: redis-session
  namespace: vshn-airlock-dev-01
spec:
  cookie:
    name: CUSTOMER_SESS
  defaultTimeouts:
    idle: 135m
    lifetime: 735m
  mode: Enforce
  persistence:
    redisProviderRef:
      name: redis-provider
---
apiVersion: microgateway.airlock.com/v1alpha1
kind: RedisProvider
metadata:
  name: redis-provider
  namespace: vshn-airlock-dev-01
spec:
  auth:
    password:
      secretRef:
        name: redis-password
    username: default
  mode:
    standalone:
      host: redis-master.vshn-redis-redis-58ztv.svc.cluster.local
      port: 6379
  timeouts:
    connect: 10s
    maxDuration: 2s
  tls:
    certificateVerification:
      custom:
        trustedCA:
          certificates:
            - secretRef:
                name: redis-ca
    clientCertificate:
      secretRef:
        name: redis-clientcert
---
apiVersion: v1
kind: Namespace
metadata:
  annotations: {}
  labels:
    name: vshn-airlock-dev-01
    openshift.io/cluster-monitoring: 'true'
  name: vshn-airlock-dev-01
