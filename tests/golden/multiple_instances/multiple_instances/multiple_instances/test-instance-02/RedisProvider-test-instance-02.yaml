apiVersion: microgateway.airlock.com/v1alpha1
kind: RedisProvider
metadata:
  name: test-instance-02
  namespace: test-instance-02
spec:
  auth:
    password:
      secretRef:
        name: redis-password
    username: default
  mode:
    standalone:
      host: redis-master
      port: 6379
  timeouts:
    connect: 10s
    maxDuration: 2s
  tls:
    certificateVerification:
      custom:
        trustedCA:
          certificates:
            - secretRef:
                name: redis-ca
    clientCertificate:
      secretRef:
        name: redis-clientcert
