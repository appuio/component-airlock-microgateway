apiVersion: v1
data:
  debug: |
    customResponses:
      "401":
        content:
        - body:
            value: |
              <!DOCTYPE html>
              <html lang="de">
              <head>
                  <meta charset="utf-8">
                  <meta name="viewport" content="width=device-width, initial-scale=1.0">
                  <title>Customer Error 401</title>
                  <style>
                      @media (max-height: 550px) {
                          body { overflow-y: auto; height: auto; }
                      }
                  </style>
              </head>
              <body>
              <main>
                  <h1><span class="textcode">Error </span>401</h1>
                  <section>
                    <h2 lang="de">Access Denied</h2>
                    <p lang="de">You can't access this application.<br>
                    Additional info: <a href="https://support.customer.com">Support</a>.</p>
                  </section>
              </main>
              <footer>
                  REQUEST ID: %STREAM_ID%
              </footer>
              </body>
              </html>
          contentType: "text/html"
          headers: {}
      "403":
        content:
        - body:
            value: |
              %RESPONSE_CODE%
          contentType: "text/html"
      "404":
        content:
        - body:
            value: |
              %RESPONSE_CODE%
          contentType: "text/html"
      4xx:
        content:
        - body:
            value: |
              %RESPONSE_CODE%
          contentType: "text/html"
      "502":
        content:
        - body:
            value: |
              %RESPONSE_CODE%
          contentType: "text/html"
      5xx:
        content:
        - body:
            value: |
              %RESPONSE_CODE%
          contentType: "text/html"
    egressNetpol:
      spec:
        egress:
        - ports:
          - port: 13377
            protocol: "TCP"
          to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: "syn-airlock-microgateway"
        podSelector:
          matchLabels:
            gateway.networking.k8s.io/gateway-class-name: "microgateway-cloudscale"
            gateway.networking.k8s.io/gateway-name: "vshn-instances-test-01"
        policyTypes:
        - "Egress"
    gateway:
      spec:
        gatewayClassName: "test-instances-01"
        listeners:
        - allowedRoutes:
            namespaces:
              from: "All"
          name: "http"
          port: 80
          protocol: "HTTP"
    gatewayParameters:
      spec:
        defaults:
          customResponses:
            local:
            - customResponseRef:
                name: "401"
              statusCodeCondition:
                matcher:
                  exact: 401
            - customResponseRef:
                name: "403"
              statusCodeCondition:
                matcher:
                  exact: 403
            - customResponseRef:
                name: "404"
              statusCodeCondition:
                matcher:
                  exact: 404
            - customResponseRef:
                name: "4xx"
              statusCodeCondition:
                matcher:
                  range:
                    from: 400
                    to: 499
            - customResponseRef:
                name: "502"
              statusCodeCondition:
                matcher:
                  exact: 502
            - customResponseRef:
                name: "5xx"
              statusCodeCondition:
                matcher:
                  range:
                    from: 500
                    to: 599
            upstream:
            - customResponseRef:
                name: "401"
              responseConditions:
                statusCode:
                  matcher:
                    exact: 401
            - customResponseRef:
                name: "403"
              responseConditions:
                statusCode:
                  matcher:
                    exact: 403
            - customResponseRef:
                name: "404"
              responseConditions:
                statusCode:
                  matcher:
                    exact: 404
            - customResponseRef:
                name: "4xx"
              responseConditions:
                statusCode:
                  matcher:
                    range:
                      end: 499
                      start: 400
            - customResponseRef:
                name: "502"
              responseConditions:
                statusCode:
                  matcher:
                    exact: 502
            - customResponseRef:
                name: "5xx"
              responseConditions:
                statusCode:
                  matcher:
                    range:
                      end: 599
                      start: 500
          downstream:
            remoteIP:
              proxyProtocol: {}
          sessionHandlingRef:
            name: "redis-session"
        features:
          envoyExtensionPolicyEnabled: true
          insecureTLSAllowed: true
        kubernetes:
          deployment:
            automountServiceAccountToken: false
            engineContainer:
              resources:
                limits:
                  cpu: 1
                  memory: "512Mi"
                requests:
                  cpu: "100m"
                  memory: "256Mi"
            placement:
              affinity:
                podAntiAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchExpressions:
                      - key: "gateway.networking.k8s.io/gateway-name"
                        operator: "In"
                        values:
                        - "vshn-instances-test-01"
                    topologyKey: "kubernetes.io/hostname"
              nodeSelector:
                node-role.kubernetes.io/infra: ""
                node-role.kubernetes.io/test: ""
            replicas: 2
    httpRedirect:
      metadata:
        name: "http-filter-redirect"
        namespace: "vshn-instances-test-01"
      spec:
        hostnames:
        - "*.test.com"
        parentRefs:
        - group: "gateway.networking.k8s.io"
          kind: "Gateway"
          name: "vshn-instances-test-01"
          sectionName: "http-default"
        rules:
        - filters:
          - requestRedirect:
              scheme: "https"
              statusCode: 301
            type: "RequestRedirect"
          matches:
          - method: "GET"
            path:
              type: "PathPrefix"
              value: "/"
    namespace:
      annotations: {}
      labels:
        appuio.ch/waf: "airlock"
        vshn.microgateway/redis-sync-secret: "true"
    pdb:
      metadata:
        labels:
          gateway.networking.k8s.io/gateway-name: "vshn-instances-test-01"
        name: "vshn-instances-test-01"
        namespace: "vshn-instances-test-01"
      spec:
        minAvailable: 1
        selector:
          matchLabels:
            gateway.networking.k8s.io/gateway-name: "vshn-instances-test-01"
        unhealthyPodEvictionPolicy: "IfHealthyBudget"
    redisProvider:
      spec:
        auth:
          password:
            secretRef:
              name: "redis-password"
          username: "default"
        mode:
          standalone:
            host: "redis-master"
            port: 6379
        timeouts:
          connect: "10s"
          maxDuration: "2s"
        tls:
          certificateVerification:
            custom:
              trustedCA:
                certificates:
                - secretRef:
                    name: "redis-ca"
          clientCertificate:
            secretRef:
              name: "redis-clientcert"
    sessionHandling:
      spec:
        auth:
          password:
            secretRef:
              name: "redis-password"
          username: "default"
        mode:
          standalone:
            host: "redis-master"
            port: 6379
        timeouts:
          connect: "10s"
          maxDuration: "2s"
        tls:
          certificateVerification:
            custom:
              trustedCA:
                certificates:
                - secretRef:
                    name: "redis-ca"
          clientCertificate:
            secretRef:
              name: "redis-clientcert"
kind: ConfigMap
metadata:
  labels:
    name: debug-configmap
  name: debug-configmap
  namespace: test-instance-01
