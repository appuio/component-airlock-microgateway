apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: test-instance-02
  namespace: test-instance-02
spec:
  gatewayClassName: test-default
  listeners:
    - allowedRoutes:
        namespaces:
          from: default
      name: default
      port: 80
      protocol: default
    - allowedRoutes:
        namespaces:
          from: default
      name: default
      port: 80
      protocol: default
---
apiVersion: microgateway.airlock.com/v1alpha1
defaults: null
kind: GatewayParameters
metadata:
  name: test-instance-02
  namespace: test-instance-02
spec:
  defaults:
    downstream:
      remoteIP:
        proxyProtocol: {}
    sessionHandlingRef:
      name: redis-session
  features:
    envoyExtensionPolicyEnabled: true
    insecureTLSAllowed: true
  kubernetes:
    deployment:
      automountServiceAccountToken: false
      engineContainer:
        resources:
          limits:
            cpu: 1
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
      placement:
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: gateway.networking.k8s.io/gateway-name
                      operator: In
                      values:
                        - vshn-instances-test-01
                topologyKey: kubernetes.io/hostname
        nodeSelector:
          node-role.kubernetes.io/infra: ''
      replicas: 2
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-filter-redirect
  namespace: test-instance-02
spec:
  hostnames:
    - '*.test.com'
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: vshn-instances-test-01
      sectionName: http-default
  rules:
    - filters:
        - requestRedirect:
            scheme: https
            statusCode: 301
          type: RequestRedirect
      matches:
        - method: GET
          path:
            type: PathPrefix
            value: /
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  labels:
    gateway.networking.k8s.io/gateway-name: test-instance-02
  name: vshn-instances-test-01
  namespace: test-instance-02
spec:
  minAvailable: 1
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: vshn-instances-test-01
  unhealthyPodEvictionPolicy: IfHealthyBudget
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  namespace: test-instance-02
spec:
  egress:
    - ports:
        - port: 13377
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: syn-airlock-microgateway
  podSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-class-name: microgateway-cloudscale
      gateway.networking.k8s.io/gateway-name: vshn-instances-test-01
  policyTypes:
    - Egress
---
apiVersion: microgateway.airlock.com/v1alpha1
kind: SessionHandling
metadata:
  name: test-instance-02
  namespace: test-instance-02
spec:
  auth:
    password:
      secretRef:
        name: redis-password
    username: default
  mode:
    standalone:
      host: redis-master
      port: 6379
  timeouts:
    connect: 10s
    maxDuration: 2s
  tls:
    certificateVerification:
      custom:
        trustedCA:
          certificates:
            - secretRef:
                name: redis-ca
    clientCertificate:
      secretRef:
        name: redis-clientcert
---
apiVersion: microgateway.airlock.com/v1alpha1
kind: RedisProvider
metadata:
  name: test-instance-02
  namespace: test-instance-02
spec:
  auth:
    password:
      secretRef:
        name: redis-password
    username: default
  mode:
    standalone:
      host: redis-master
      port: 6379
  timeouts:
    connect: 10s
    maxDuration: 2s
  tls:
    certificateVerification:
      custom:
        trustedCA:
          certificates:
            - secretRef:
                name: redis-ca
    clientCertificate:
      secretRef:
        name: redis-clientcert
---
apiVersion: v1
kind: Namespace
metadata:
  annotations: {}
  labels:
    appuio.ch/waf: airlock
    name: test-instance-02
    openshift.io/cluster-monitoring: 'true'
    vshn.microgateway/redis-sync-secret: 'true'
  name: test-instance-02
