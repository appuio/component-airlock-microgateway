apiVersion: v1
kind: ServiceAccount
metadata:
  annotations: {}
  labels:
    name: httproute-cert-creator-manager
  name: httproute-cert-creator-manager
  namespace: syn-airlock-microgateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations: {}
  labels:
    name: espejote-httproute-cert-creator
  name: espejote:httproute-cert-creator
rules:
  - apiGroups:
      - cert-manager.io
    resources:
      - certificates
    verbs:
      - '*'
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - httproutes
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  annotations: {}
  labels:
    name: espejote-httproute-cert-creator
  name: espejote:httproute-cert-creator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: espejote:httproute-cert-creator
subjects:
  - kind: ServiceAccount
    name: httproute-cert-creator-manager
    namespace: syn-airlock-microgateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  annotations: {}
  labels:
    name: espejote-httproute-cert-creator
  name: espejote:httproute-cert-creator
  namespace: syn-airlock-microgateway
rules:
  - apiGroups:
      - espejote.io
    resources:
      - jsonnetlibraries
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  annotations: {}
  labels:
    name: espejote-httproute-cert-creator
  name: espejote:httproute-cert-creator
  namespace: syn-airlock-microgateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: espejote:httproute-cert-creator
subjects:
  - kind: ServiceAccount
    name: httproute-cert-creator-manager
    namespace: syn-airlock-microgateway
