gateway:
  spec:
    gatewayClassName: test-default
    listeners:
      - allowedRoutes:
          namespaces:
            from: default
        name: default
        port: 80
        protocol: default
gatewayParameters:
  spec:
    defaults:
      downstream:
        remoteIP:
          proxyProtocol: {}
      sessionHandlingRef:
        name: redis-session
    features:
      envoyExtensionPolicyEnabled: true
      insecureTLSAllowed: true
    kubernetes:
      deployment:
        automountServiceAccountToken: false
        engineContainer:
          resources:
            limits:
              cpu: 1
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
        placement:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: gateway.networking.k8s.io/gateway-name
                        operator: In
                        values:
                          - vshn-airlock-dev-01
                  topologyKey: kubernetes.io/hostname
          nodeSelector:
            node-role.kubernetes.io/infra: ''
        replicas: 2
namespace:
  labels:
    appuio.ch/waf: airlock
    vshn.microgateway/redis-sync-secret: 'true'
spec:
  gatewayClassName: microgateway-cloudscale
  infrastructure:
    parametersRef:
      group: microgateway.airlock.com
      kind: GatewayParameters
      name: parameters-dev-01
  listeners:
    - name: class_default
      port: 80
      protocol: HTTP
