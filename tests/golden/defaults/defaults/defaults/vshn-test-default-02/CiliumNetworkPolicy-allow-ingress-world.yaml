apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-world
  namespace: vshn-test-default-02
spec:
  endpointSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: vshn-test-default-02
      microgateway.airlock.com/managedBy: test-operator-namespace
  ingress:
    - fromEntities:
        - world
