  namespace: vshn-default-test-01
spec:
  endpointSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: vshn-default-test-01
      microgateway.airlock.com/managedBy: test-operator-namespace
  ingress:
    - fromEntities:
        - world
