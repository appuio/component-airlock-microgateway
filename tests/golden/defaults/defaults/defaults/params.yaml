_metadata:
  multi_instance: true
  multi_tenant: true
default:
  egressNetpol:
    spec:
      egress:
        - ports:
            - port: 13377
              protocol: TCP
          to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: syn-airlock-microgateway
        - ports:
            - port: 5353
              protocol: UDP
          to:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: openshift-dns
      podSelector:
        matchLabels:
          gateway.networking.k8s.io/gateway-class-name: microgateway-cloudscale
          gateway.networking.k8s.io/gateway-name: vshn-default-test-01
      policyTypes:
        - Egress
  gateway:
    spec:
      gatewayClassName: test-default
      listeners:
        - allowedRoutes:
            namespaces:
              from: default
          name: default
          port: 80
          protocol: default
  gatewayParameters:
    spec:
      defaults:
        downstream:
          remoteIP:
            proxyProtocol: {}
        sessionHandlingRef:
          name: redis-session
      features:
        envoyExtensionPolicyEnabled: true
        insecureTLSAllowed: true
      kubernetes:
        deployment:
          automountServiceAccountToken: false
          engineContainer:
            resources:
              limits:
                cpu: 1
                memory: 512Mi
              requests:
                cpu: 100m
                memory: 256Mi
          placement:
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchExpressions:
                        - key: gateway.networking.k8s.io/gateway-name
                          operator: In
                          values:
                            - vshn-default-test-01
                    topologyKey: kubernetes.io/hostname
            nodeSelector:
              node-role.kubernetes.io/infra: ''
          replicas: 2
  httpRedirect:
    metadata:
      name: http-filter-redirect
      namespace: vshn-default-test-01
    spec:
      hostnames:
        - '*.test.com'
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: vshn-default-test-01
          sectionName: http-default
      rules:
        - filters:
            - requestRedirect:
                scheme: https
                statusCode: 301
              type: RequestRedirect
          matches:
            - method: GET
              path:
                type: PathPrefix
                value: /
  namespace:
    labels:
      appuio.ch/waf: airlock
      vshn.microgateway/redis-sync-secret: 'true'
  pdb:
    metadata:
      labels:
        gateway.networking.k8s.io/gateway-name: vshn-default-test-01
      name: vshn-default-test-01
      namespace: vshn-default-test-01
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          gateway.networking.k8s.io/gateway-name: vshn-default-test-01
      unhealthyPodEvictionPolicy: IfHealthyBudget
  redisProvider:
    spec:
      auth:
        password:
          secretRef:
            name: redis-password
        username: default
      mode:
        standalone:
          host: redis-master
          port: 6379
      timeouts:
        connect: 10s
        maxDuration: 2s
      tls:
        certificateVerification:
          custom:
            trustedCA:
              certificates:
                - secretRef:
                    name: redis-ca
        clientCertificate:
          secretRef:
            name: redis-clientcert
  sessionHandling:
    spec:
      auth:
        password:
          secretRef:
            name: redis-password
        username: default
      mode:
        standalone:
          host: redis-master
          port: 6379
      timeouts:
        connect: 10s
        maxDuration: 2s
      tls:
        certificateVerification:
          custom:
            trustedCA:
              certificates:
                - secretRef:
                    name: redis-ca
        clientCertificate:
          secretRef:
            name: redis-clientcert
instances: {}
