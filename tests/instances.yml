---
applications:
  - airlock-microgateway

parameters:
  airlock_microgateway:
    default:
      namespace:
        labels:
          appuio.ch/waf: airlock
          vshn.microgateway/redis-sync-secret: "true"
      gateway:
        spec:
          gatewayClassName: test-default
          listeners:
            - allowedRoutes:
                namespaces:
                  from: default
              name: default
              port: 80
              protocol: default
      pdb:
        metadata:
          labels:
            gateway.networking.k8s.io/gateway-name: vshn-airlock-dev-01
          name: vshn-airlock-dev-01
          namespace: vshn-airlock-dev-01
        spec:
          minAvailable: 1
          selector:
            matchLabels:
              "gateway.networking.k8s.io/gateway-name": vshn-airlock-dev-01
          unhealthyPodEvictionPolicy: IfHealthyBudget
      redisProvider:
        spec:
          auth:
            password:
              secretRef:
                name: redis-password
            username: default
          mode:
            standalone:
              host: redis-master.vshn-redis-redis-58ztv.svc.cluster.local
              port: 6379
          timeouts:
            connect: 10s
            maxDuration: 2s
          tls:
            certificateVerification:
              custom:
                trustedCA:
                  certificates:
                    - secretRef:
                        name: redis-ca
            clientCertificate:
              secretRef:
                name: redis-clientcert
      sessionHandling:
        spec:
          auth:
            password:
              secretRef:
                name: redis-password
            username: default
          mode:
            standalone:
              host: redis-master.vshn-redis-redis-58ztv.svc.cluster.local
              port: 6379
          timeouts:
            connect: 10s
            maxDuration: 2s
          tls:
            certificateVerification:
              custom:
                trustedCA:
                  certificates:
                    - secretRef:
                        name: redis-ca
            clientCertificate:
              secretRef:
                name: redis-clientcert
      egressNetpol:
        spec:
          podSelector:
            matchLabels:
              gateway.networking.k8s.io/gateway-class-name: microgateway-cloudscale
              gateway.networking.k8s.io/gateway-name: vshn-airlock-dev-01
          policyTypes: [Egress]
          egress:
            # allow Microgateway Operator
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: syn-airlock-microgateway
              ports:
                - port: 13377
                  protocol: TCP
            # allow DNS
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: openshift-dns
              ports:
                - port: 5353
                  protocol: UDP
            # allow sessionhandling (redis)
            - to:
                - namespaceSelector:
                    matchLabels:
                      appcat.vshn.io/claim-namespace: vshn-airlock-redis
              ports:
                - port: 6379
                  protocol: TCP
            # allow broker(keycloak)
            - to:
                - namespaceSelector:
                    matchLabels:
                      appcat.vshn.io/claim-namespace: broker-test
              ports:
                - port: 8080
                  protocol: TCP
                - port: 8443
                  protocol: TCP
      httpRedirect:
        metadata:
          name: http-filter-redirect
          namespace: vshn-airlock-dev-01
        spec:
          parentRefs:
            - group: gateway.networking.k8s.io
              name: vshn-airlock-dev-01
              kind: Gateway
              sectionName: http-default
          hostnames:
            - "*.hintest.ch"
          rules:
            - matches:
                - method: GET
                  path:
                    type: PathPrefix
                    value: /
              filters:
                - type: RequestRedirect
                  requestRedirect:
                    scheme: https
                    statusCode: 301

  instances:
    default:
      namespace:
        labels:
          appuio.ch/waf: airlock
          vshn.microgateway/redis-sync-secret: "true"
      gateway:
        spec:
          gatewayClassName: test-default
          listeners:
            - allowedRoutes:
                namespaces:
                  from: default
              name: default
              port: 80
              protocol: default
      gatewayParameters:
        spec:
          defaults:
            downstream:
              remoteIP:
                proxyProtocol: {}
            sessionHandlingRef:
              name: redis-session
          features:
            envoyExtensionPolicyEnabled: true
            insecureTLSAllowed: true
          kubernetes:
            deployment:
              automountServiceAccountToken: false
              engineContainer:
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    cpu: 1
                    memory: 512Mi
              placement:
                affinity:
                  podAntiAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      - labelSelector:
                          matchExpressions:
                            - key: gateway.networking.k8s.io/gateway-name
                              operator: In
                              values:
                                - "vshn-airlock-dev-01"
                        topologyKey: kubernetes.io/hostname
                nodeSelector:
                  node-role.kubernetes.io/infra: ""
              replicas: 2
    instances:
      test-instance-01:
        gateway:
          spec:
            gatewayClassName: test-instances-01
            listeners:
              - allowedRoutes:
                  namespaces:
                    from: All
                name: http
                port: 80
                protocol: HTTP
        gatewayParameters:
          spec:
            kubernetes:
              deployment:
                placement:
                  affinity:
                    podAntiAffinity:
                      requiredDuringSchedulingIgnoredDuringExecution:
                        - labelSelector:
                            matchExpressions:
                              - key: gateway.networking.k8s.io/gateway-name
                                operator: In
                                values:
                                  - "vshn-test-test"
                          topologyKey: kubernetes.io/hostname
                  nodeSelector:
                    node-role.kubernetes.io/test: ""
      test-instance-02: {}
