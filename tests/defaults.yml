---
applications:
  - airlock-microgateway

parameters:
  airlock_microgateway:
    default:
      namespace:
        labels:
          appuio.ch/waf: airlock
          vshn.microgateway/redis-sync-secret: "true"
      gateway:
        spec:
          gatewayClassName: test-default
          listeners:
            - allowedRoutes:
                namespaces:
                  from: default
              name: default
              port: 80
              protocol: default
      gatewayParameters:
        spec:
          defaults:
            downstream:
              remoteIP:
                proxyProtocol: {}
            sessionHandlingRef:
              name: redis-session
          features:
            envoyExtensionPolicyEnabled: true
            insecureTLSAllowed: true
          kubernetes:
            deployment:
              automountServiceAccountToken: false
              engineContainer:
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    cpu: 1
                    memory: 512Mi
              placement:
                affinity:
                  podAntiAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      - labelSelector:
                          matchExpressions:
                            - key: gateway.networking.k8s.io/gateway-name
                              operator: In
                              values:
                                - "vshn-airlock-dev-01"
                        topologyKey: kubernetes.io/hostname
                nodeSelector:
                  node-role.kubernetes.io/infra: ""
              replicas: 2
      httpRedirect:
        metadata:
          name: http-filter-redirect
          namespace: vshn-airlock-dev-01
        spec:
          parentRefs:
            - group: gateway.networking.k8s.io
              name: vshn-airlock-dev-01
              kind: Gateway
              sectionName: http-default
          hostnames:
            - "*.hintest.ch"
          rules:
            - matches:
                - method: GET
                  path:
                    type: PathPrefix
                    value: /
              filters:
                - type: RequestRedirect
                  requestRedirect:
                    scheme: https
                    statusCode: 301

    instances:
      test-instance-01:
        namespace: vshn-airlock-test-01
        gateway:
          spec:
            gatewayClassName: test-instances-01
            listeners:
              - allowedRoutes:
                  namespaces:
                    from: All
                name: http
                port: 80
                protocol: HTTP
                gateway_parameters:
        gatewayParameters:
          spec:
            kubernetes:
              deployment:
                placement:
                  affinity:
                    podAntiAffinity:
                      requiredDuringSchedulingIgnoredDuringExecution:
                        - labelSelector:
                            matchExpressions:
                              - key: gateway.networking.k8s.io/gateway-name
                                operator: In
                                values:
                                  - "vshn-test-test"
                          topologyKey: kubernetes.io/hostname
                  nodeSelector:
                    node-role.kubernetes.io/test: ""

      test-instance-02:
        namespace: vshn-airlock-test-02
