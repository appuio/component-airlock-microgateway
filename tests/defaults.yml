---
applications:
  - airlock-microgateway

parameters:
  # Dependency for testing add after RedisProvider, SessionHandling is merged to upstream
  # remove ./lib/* aterwards
  #  kapitan:
  #    dependencies:
  #      - type: https
  #        source: https://raw.githubusercontent.com/appuio/component-airlock-microgateway-operator/master/lib/airlock-microgateway-operator.libsonnet
  #        output_path: vendor/lib/airlock-microgateway-operator.libsonnet
  syn:
    teams:
      nunki:
        instances:
          - airlock_microgateway
  airlock_microgateway:
    instances:
      vshn-default-test-01:
        gateway:
          spec:
            gatewayClassName: test-default
            listeners:
              - allowedRoutes:
                  namespaces:
                    from: All
                name: http
                port: 80
                protocol: HTTP
        gatewayParameters:
          spec:
            kubernetes:
              deployment:
                placement:
                  affinity:
                    podAntiAffinity:
                      requiredDuringSchedulingIgnoredDuringExecution:
                        - labelSelector:
                            matchExpressions:
                              - key: gateway.networking.k8s.io/gateway-name
                                operator: In
                                values:
                                  - "vshn-test-default-01"
                          topologyKey: kubernetes.io/hostname
                  nodeSelector:
                    node-role.kubernetes.io/test: ""
      vshn-test-default-02: {}

    default:
      namespace:
        labels:
          appuio.ch/waf: airlock
          vshn.microgateway/redis-sync-secret: "true"
      gateway:
        spec:
          gatewayClassName: test-default
          listeners:
            - allowedRoutes:
                namespaces:
                  from: default
              name: default
              port: 80
              protocol: default
      pdb:
        metadata:
          labels:
            gateway.networking.k8s.io/gateway-name: vshn-default-test-01
          name: vshn-default-test-01
          namespace: vshn-default-test-01
        spec:
          minAvailable: 1
          selector:
            matchLabels:
              "gateway.networking.k8s.io/gateway-name": vshn-default-test-01
          unhealthyPodEvictionPolicy: IfHealthyBudget
      gatewayParameters:
        spec:
          defaults:
            downstream:
              remoteIP:
                proxyProtocol: {}
            sessionHandlingRef:
              name: redis-session
          features:
            envoyExtensionPolicyEnabled: true
            insecureTLSAllowed: true
          kubernetes:
            deployment:
              automountServiceAccountToken: false
              engineContainer:
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    cpu: 1
                    memory: 512Mi
              placement:
                affinity:
                  podAntiAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      - labelSelector:
                          matchExpressions:
                            - key: gateway.networking.k8s.io/gateway-name
                              operator: In
                              values:
                                - "vshn-default-test-01"
                        topologyKey: kubernetes.io/hostname
                nodeSelector:
                  node-role.kubernetes.io/infra: ""
              replicas: 2
      redisProvider:
        spec:
          auth:
            password:
              secretRef:
                name: redis-password
            username: default
          mode:
            standalone:
              host: redis-master
              port: 6379
          timeouts:
            connect: 10s
            maxDuration: 2s
          tls:
            certificateVerification:
              custom:
                trustedCA:
                  certificates:
                    - secretRef:
                        name: redis-ca
            clientCertificate:
              secretRef:
                name: redis-clientcert
      sessionHandling:
        spec:
          auth:
            password:
              secretRef:
                name: redis-password
            username: default
          mode:
            standalone:
              host: redis-master
              port: 6379
          timeouts:
            connect: 10s
            maxDuration: 2s
          tls:
            certificateVerification:
              custom:
                trustedCA:
                  certificates:
                    - secretRef:
                        name: redis-ca
            clientCertificate:
              secretRef:
                name: redis-clientcert
      egressNetpol:
        spec:
          podSelector:
            matchLabels:
              gateway.networking.k8s.io/gateway-class-name: microgateway-cloudscale
              gateway.networking.k8s.io/gateway-name: vshn-default-test-01
          policyTypes: [Egress]
          egress:
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: syn-airlock-microgateway
              ports:
                - port: 13377
                  protocol: TCP
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: openshift-dns
              ports:
                - port: 5353
                  protocol: UDP
      httpRedirect:
        metadata:
          name: http-filter-redirect
          namespace: vshn-default-test-01
        spec:
          parentRefs:
            - group: gateway.networking.k8s.io
              name: vshn-default-test-01
              kind: Gateway
              sectionName: http-default
          hostnames:
            - "*.test.com"
          rules:
            - matches:
                - method: GET
                  path:
                    type: PathPrefix
                    value: /
              filters:
                - type: RequestRedirect
                  requestRedirect:
                    scheme: https
                    statusCode: 301
