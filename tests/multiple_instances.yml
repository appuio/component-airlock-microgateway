applications:
  - airlock-microgateway
  - cilium

parameters:
  # Dependency for testing with upstream lib
  kapitan:
    dependencies:
      - type: https
        source: https://raw.githubusercontent.com/appuio/component-airlock-microgateway-operator/master/lib/airlock-microgateway-operator.libsonnet
        output_path: vendor/lib/airlock-microgateway-operator.libsonnet
  airlock_microgateway:
    debug: true
    default:
      gatewayParameters:
        defaults:
      namespace:
        labels:
          appuio.ch/waf: airlock
          vshn.microgateway/redis-sync-secret: "true"
      gateway:
        spec:
          gatewayClassName: test-default
          listeners:
            - allowedRoutes:
                namespaces:
                  from: default
              name: default
              port: 80
              protocol: default
      pdb:
        metadata:
          labels:
            gateway.networking.k8s.io/gateway-name: vshn-instances-test-01
          name: vshn-instances-test-01
          namespace: vshn-instances-test-01
        spec:
          minAvailable: 1
          selector:
            matchLabels:
              "gateway.networking.k8s.io/gateway-name": vshn-instances-test-01
          unhealthyPodEvictionPolicy: IfHealthyBudget
      redisProvider:
        spec:
          auth:
            password:
              secretRef:
                name: redis-password
            username: default
          mode:
            standalone:
              host: redis-master
              port: 6379
          timeouts:
            connect: 10s
            maxDuration: 2s
          tls:
            certificateVerification:
              custom:
                trustedCA:
                  certificates:
                    - secretRef:
                        name: redis-ca
            clientCertificate:
              secretRef:
                name: redis-clientcert
      sessionHandling:
        spec:
          auth:
            password:
              secretRef:
                name: redis-password
            username: default
          mode:
            standalone:
              host: redis-master
              port: 6379
          timeouts:
            connect: 10s
            maxDuration: 2s
          tls:
            certificateVerification:
              custom:
                trustedCA:
                  certificates:
                    - secretRef:
                        name: redis-ca
            clientCertificate:
              secretRef:
                name: redis-clientcert
      egressNetpol:
        spec:
          podSelector:
            matchLabels:
              gateway.networking.k8s.io/gateway-class-name: microgateway-cloudscale
              gateway.networking.k8s.io/gateway-name: vshn-instances-test-01
          policyTypes: [Egress]
          egress:
            # allow Microgateway Operator
            - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: syn-airlock-microgateway
              ports:
                - port: 13377
                  protocol: TCP
      httpRedirect:
        metadata:
          name: http-filter-redirect
          namespace: vshn-instances-test-01
        spec:
          parentRefs:
            - group: gateway.networking.k8s.io
              name: vshn-instances-test-01
              kind: Gateway
              sectionName: http-default
          hostnames:
            - "*.test.com"
          rules:
            - matches:
                - method: GET
                  path:
                    type: PathPrefix
                    value: /
              filters:
                - type: RequestRedirect
                  requestRedirect:
                    scheme: https
                    statusCode: 301
      customResponses:
        "401":
          content:
            - contentType: text/html
              body:
                value: |
                  <!DOCTYPE html>
                  <html lang="de">
                  <head>
                      <meta charset="utf-8">
                      <meta name="viewport" content="width=device-width, initial-scale=1.0">
                      <title>Customer Error 401</title>
                      <style>
                          @media (max-height: 550px) {
                              body { overflow-y: auto; height: auto; }
                          }
                      </style>
                  </head>
                  <body>
                  <main>
                      <h1><span class="textcode">Error </span>401</h1>
                      <section>
                        <h2 lang="de">Access Denied</h2>
                        <p lang="de">You can't access this application.<br>
                        Additional info: <a href="https://support.customer.com">Support</a>.</p>
                      </section>
                  </main>
                  <footer>
                      REQUEST ID: %STREAM_ID%
                  </footer>
                  </body>
                  </html>
              headers:
        "403":
          content:
            - contentType: text/html
              body:
                value: |
                  %RESPONSE_CODE%
        "404":
          content:
            - contentType: text/html
              body:
                value: |
                  %RESPONSE_CODE%
        "4xx":
          content:
            - contentType: text/html
              body:
                value: |
                  %RESPONSE_CODE%

  multiple_instances:
    default:
      gateway:
        spec:
          gatewayClassName: test-default
          listeners:
            - allowedRoutes:
                namespaces:
                  from: default
              name: default
              port: 80
              protocol: default
      gatewayParameters:
        spec:
          defaults:
            downstream:
              remoteIP:
                proxyProtocol: {}
            sessionHandlingRef:
              name: redis-session
          features:
            envoyExtensionPolicyEnabled: true
            insecureTLSAllowed: true
          kubernetes:
            deployment:
              automountServiceAccountToken: false
              engineContainer:
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    cpu: 1
                    memory: 512Mi
              placement:
                affinity:
                  podAntiAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      - labelSelector:
                          matchExpressions:
                            - key: gateway.networking.k8s.io/gateway-name
                              operator: In
                              values:
                                - "vshn-instances-test-01"
                        topologyKey: kubernetes.io/hostname
                nodeSelector:
                  node-role.kubernetes.io/infra: ""
              replicas: 2
    instances:
      test-instance-02:
        blabla: {}
