applications:
  - airlock-microgateway as live_example_dev

parameters:
  # Dependency for testing add after RedisProvider, SessionHandling is merged to upstream
  # remove ./lib/* aterwards
  #  kapitan:
  #    dependencies:
  #      - type: https
  #        source: https://raw.githubusercontent.com/appuio/component-airlock-microgateway-operator/master/lib/airlock-microgateway-operator.libsonnet
  #        output_path: vendor/lib/airlock-microgateway-operator.libsonnet
  syn:
    teams:
      nunki:
        instances:
          - live_example_dev

  airlock_microgateway:
    default:
      gateway:
      gatewayParameters:
      pdb:
      redisProvider:
      sessionHandling:
      egressNetpol:
      httpRedirect:
  live_example_dev:
    instances:
      vshn-airlock-dev-01:
        gateway:
          metadata:
            annotations:
              airlock-microgateway.appuio.io/httproute-default-cluster-issuer: digicert-ev
          spec:
            gatewayClassName: microgateway-cloudscale
            infrastructure:
              parametersRef:
                group: microgateway.airlock.com
                kind: GatewayParameters
                name: parameters-dev-01
            listeners:
              - name: http-default
                protocol: HTTP
                port: 80
        gatewayParameters:
          spec:
            defaults:
              downstream:
                remoteIP:
                  proxyProtocol: {}
              sessionHandlingRef:
                name: redis-session
            features:
              envoyExtensionPolicyEnabled: true
              insecureTLSAllowed: true
            kubernetes:
              deployment:
                automountServiceAccountToken: false
                engineContainer:
                  resources:
                    requests:
                      cpu: 100m
                      memory: 256Mi
                    limits:
                      cpu: 1
                      memory: 512Mi
                placement:
                  affinity:
                    podAntiAffinity:
                      requiredDuringSchedulingIgnoredDuringExecution:
                        - labelSelector:
                            matchExpressions:
                              - key: gateway.networking.k8s.io/gateway-name
                                operator: In
                                values:
                                  - "vshn-airlock-dev-01"
                          topologyKey: kubernetes.io/hostname
                  nodeSelector:
                    node-role.kubernetes.io/infra: ""
                replicas: 2
              service:
                # 1.1.1.1: Jumphost 1
                # 1.1.1.2: Jumphost 2
                # 1.1.1.3: NAT-Address Test Infra
                annotations:
                  k8s.cloudscale.ch/loadbalancer-listener-allowed-cidrs: '["42.65.119.49/32", "9b2f:48d7:fad1:7a1c::178/128"]'
                  k8s.cloudscale.ch/loadbalancer-pool-protocol: proxyv2
                  k8s.cloudscale.ch/loadbalancer-floating-ips: '["46.246.132.110/32","9b2f:7a1c:fad1/128"]'
                  k8s.cloudscale.ch/loadbalancer-name: "ingress-dev-01"
                externalTrafficPolicy: Local
                type: LoadBalancer
            logging:
              level: info
        pdb:
          metadata:
            labels:
              gateway.networking.k8s.io/gateway-name: vshn-airlock-dev-01
            name: vshn-airlock-dev-01
          spec:
            minAvailable: 1
            selector:
              matchLabels:
                "gateway.networking.k8s.io/gateway-name": vshn-airlock-dev-01
            unhealthyPodEvictionPolicy: IfHealthyBudget
        redisProvider:
          metadata:
            name: redis-provider
          spec:
            auth:
              password:
                secretRef:
                  name: redis-password
              username: default
            mode:
              standalone:
                host: redis-master.vshn-redis-redis-58ztv.svc.cluster.local
                port: 6379
            timeouts:
              connect: 10s
              maxDuration: 2s
            tls:
              certificateVerification:
                custom:
                  trustedCA:
                    certificates:
                      - secretRef:
                          name: redis-ca
              clientCertificate:
                secretRef:
                  name: redis-clientcert
        sessionHandling:
          metadata:
            name: redis-session
          spec:
            mode: Enforce
            persistence:
              # Specify the Redis database where sessions should be stored
              redisProviderRef:
                name: redis-provider
            defaultTimeouts:
              # Specify idle timeout of a session
              idle: 135m # 2h 15m
              # Specify maximum lifetime of a session
              lifetime: 735m # 12h 15m
            cookie:
              name: CUSTOMER_SESS
        egressNetpol:
          metadata:
            name: microgateway-egress
          spec:
            podSelector:
              matchLabels:
                gateway.networking.k8s.io/gateway-class-name: microgateway-cloudscale
                gateway.networking.k8s.io/gateway-name: vshn-airlock-dev-01
            policyTypes: [Egress]
            egress:
              # allow Microgateway Operator
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: syn-airlock-microgateway
                ports:
                  - port: 13377
                    protocol: TCP
              # allow DNS
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: openshift-dns
                ports:
                  - port: 5353
                    protocol: UDP
              # allow sessionhandling (redis)
              - to:
                  - namespaceSelector:
                      matchLabels:
                        appcat.vshn.io/claim-namespace: vshn-airlock-redis
                ports:
                  - port: 6379
                    protocol: TCP
              # allow broker(keycloak)
              - to:
                  - namespaceSelector:
                      matchLabels:
                        appcat.vshn.io/claim-namespace: broker-preprod
                ports:
                  - port: 8080
                    protocol: TCP
                  - port: 8443
                    protocol: TCP
              # Customer specific
              - to: ### Testing only
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: customer-arch-test
                ports:
                  - port: 3000
                    protocol: TCP
              - to:
                  - ipBlock:
                      cidr: 1.1.1.1/32
                ports:
                  - port: 443
                    protocol: TCP
              - to:
                  - ipBlock:
                      cidr: 1.1.1.2/32
                ports:
                  - port: 443
                    protocol: TCP
              - to:
                  - ipBlock:
                      cidr: 1.1.1.3/32
                ports:
                  - port: 443
                    protocol: TCP
              - to:
                  - ipBlock:
                      cidr: 1.1.1.4/32
                ports:
                  - port: 80
                    protocol: TCP
              - to:
                  - ipBlock:
                      cidr: 1.1.1.5/32
                ports:
                  - port: 8080
                    protocol: TCP
              # Customer Applications
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: qa-airlock-gateway
                ports:
                  - port: 1080
                    protocol: TCP
        httpRedirect:
          metadata:
            name: http-filter-redirect
          spec:
            parentRefs:
              - group: gateway.networking.k8s.io
                name: vshn-airlock-dev-01
                kind: Gateway
                sectionName: http-default
            hostnames:
              - "*.customer.ch"
            rules:
              - matches:
                  - method: GET
                    path:
                      type: PathPrefix
                      value: /
                filters:
                  - type: RequestRedirect
                    requestRedirect:
                      scheme: https
                      statusCode: 301
